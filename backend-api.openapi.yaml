x-backend-architecture:
  recommendedStack:
    api: NestJS or Express/Fastify on Node.js
    database: PostgreSQL
    cacheAndQueues: Redis with BullMQ
    objectStorage: S3-compatible storage for generated exports
  conventions:
    - Keep every tenant-scoped table keyed by business_id.
    - Use UUID primary keys except human-readable booking and payment references.
    - Store money as integer minor units in the database, expose decimal numbers in the API.
    - Store all timestamps in UTC.
    - Use camelCase DTOs at the API boundary and snake_case columns in the database.
    - Keep catalog tables seeded and cache them aggressively.
    - Use idempotency keys for payment, refund, export, and inventory-sale writes.

x-redis-cache:
  keys:
    - key: "business:{businessId}:dashboard:summary"
      ttlSeconds: 120
      invalidatedBy: [bookings.write, payments.write, inventory.write]
    - key: "business:{businessId}:setup-warnings"
      ttlSeconds: 60
      invalidatedBy: [billing.write, account.write, security.write]
    - key: "business:{businessId}:payments:summary:{startDate}:{endDate}"
      ttlSeconds: 120
      invalidatedBy: [payments.write, refunds.write, inventory.sale]
    - key: "business:{businessId}:reports:application-stats:{period}:{startDate}:{endDate}"
      ttlSeconds: 300
      invalidatedBy: [bookings.write, payments.write, inventory.write]
    - key: "catalog:services:v1"
      ttlSeconds: 86400
      invalidatedBy: [catalog.deploy]
    - key: "catalog:inventory:v1"
      ttlSeconds: 86400
      invalidatedBy: [catalog.deploy]
    - key: "catalog:banks:v1"
      ttlSeconds: 86400
      invalidatedBy: [billing-provider.deploy]
    - key: "geo:search:{query}:{limit}"
      ttlSeconds: 86400
      invalidatedBy: []
    - key: "geo:nearby:{lat}:{lng}:{radiusMeters}"
      ttlSeconds: 3600
      invalidatedBy: []

x-bullmq-queues:
  payment-export:
    purpose: Generate Excel, PDF, Word, Google Docs HTML, and dashboard JSON exports.
    producerEndpoints:
      - POST /payments/export-jobs
    persistenceTable: export_jobs
    retryPolicy:
      attempts: 3
      backoff: exponential
  notification-dispatch:
    purpose: Send email/SMS/in-app notifications for booking decisions, support tickets, and security events.
    producerEndpoints:
      - PATCH /bookings/batch/status
      - POST /support/tickets
    persistenceTable: notification_outbox
    retryPolicy:
      attempts: 5
      backoff: exponential
  billing-verification:
    purpose: Verify bank/billing accounts after submission.
    producerEndpoints:
      - POST /billing/accounts/{billingAccountId}/submit
    persistenceTable: billing_accounts
    retryPolicy:
      attempts: 5
      backoff: exponential
  report-rollup:
    purpose: Optional nightly aggregation for report/dashboard read models.
    producerEndpoints: []
    persistenceTable: report_rollups
    retryPolicy:
      attempts: 2
      backoff: fixed

x-database:
  engine: PostgreSQL
  notes:
    - This schema is intentionally small and normalized around tenant ownership.
    - Use JSONB only for preference maps and address snapshots where extra address fields may vary by country.
    - Seed catalog tables in migrations; do not let tenant data duplicate immutable catalog labels unless a custom override is needed.
  tables:
    users:
      columns:
        - id uuid primary key
        - business_id uuid null references businesses(id)
        - email citext unique not null
        - password_hash text not null
        - role text not null check in client,business,admin
        - first_name text null
        - last_name text null
        - phone_number text null
        - birth_date date null
        - address jsonb not null default '{}'
        - avatar_url text null
        - mfa_enabled boolean not null default false
        - mfa_method text null
        - mfa_phone text null
        - mfa_secret_encrypted text null
        - security_preferences jsonb not null default '{}'
        - notification_preferences jsonb not null default '{}'
        - onboarding_completed boolean not null default false
        - created_at timestamptz not null
        - updated_at timestamptz not null
      indexes:
        - users_business_id_idx on business_id
    businesses:
      columns:
        - id uuid primary key
        - name text not null
        - email citext not null
        - phone_number text not null
        - commercial_registration_number text null
        - tax_identification_number text null
        - business_type text null
        - employee_count text null
        - address jsonb not null default '{}'
        - working_hours jsonb not null default '{}'
        - onboarding_step text not null default 'getting-started'
        - onboarding_completed boolean not null default false
        - created_at timestamptz not null
        - updated_at timestamptz not null
      indexes:
        - businesses_email_idx on email
    refresh_tokens:
      columns:
        - id uuid primary key
        - user_id uuid not null references users(id) on delete cascade
        - token_hash text not null unique
        - expires_at timestamptz not null
        - revoked_at timestamptz null
        - created_at timestamptz not null
      indexes:
        - refresh_tokens_user_id_idx on user_id
    customers:
      columns:
        - id uuid primary key
        - business_id uuid not null references businesses(id) on delete cascade
        - first_name text not null
        - last_name text not null
        - email citext null
        - phone_number text null
        - avatar_url text null
        - created_at timestamptz not null
        - updated_at timestamptz not null
      indexes:
        - customers_business_id_idx on business_id
        - customers_business_email_idx unique on business_id,email where email is not null
    vehicles:
      columns:
        - id uuid primary key
        - business_id uuid not null references businesses(id) on delete cascade
        - customer_id uuid not null references customers(id) on delete cascade
        - make text not null
        - model text not null
        - year text not null
        - plate text null
        - vin text null
        - created_at timestamptz not null
        - updated_at timestamptz not null
      indexes:
        - vehicles_business_id_idx on business_id
        - vehicles_customer_id_idx on customer_id
    service_categories:
      columns:
        - id text primary key
        - name text not null unique
        - icon text null
        - sort_order integer not null default 0
    services:
      columns:
        - id text primary key
        - category_id text not null references service_categories(id)
        - name text not null
        - icon text null
        - sort_order integer not null default 0
      indexes:
        - services_category_id_idx on category_id
    service_config_options:
      columns:
