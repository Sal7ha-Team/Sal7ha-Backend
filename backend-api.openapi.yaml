openapi: 3.0.3
info:
  title: Car Service Admin API
  version: 2.0.0
  description: |
    Backend contract for the Car Service Admin dashboard.

    The frontend currently covers authentication, onboarding, dashboard widgets,
    bookings, payments, payment exports, reports, storage inventory, business
    settings, billing account verification, notification preferences, inbox,
    feedback, help center content, and location search.

    API JSON uses camelCase. The recommended database schema uses snake_case.
    Dates should be stored and exchanged as ISO-8601 strings. The frontend can
    format those dates for display.
  contact:
    name: Car Service Admin

servers:
  - url: http://localhost:3333
    description: Local backend development
  - url: https://api.car-service-admin.example.com
    description: Production

tags:
  - name: System
  - name: Auth
  - name: Account
  - name: Onboarding
  - name: Business
  - name: Dashboard
  - name: Bookings
  - name: Customers
  - name: Vehicles
  - name: Services
  - name: Inventory
  - name: Payments
  - name: Reports
  - name: Billing
  - name: Notifications
  - name: Inbox
  - name: Support
  - name: Locations

security:
  - bearerAuth: []

paths:
  /system/health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Health check for load balancers and uptime checks
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/sign-in:
    post:
      tags: [Auth]
      operationId: signIn
      summary: Sign in as a client, business user, or admin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInDto"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/sign-up:
    post:
      tags: [Auth]
      operationId: signUpBusiness
      summary: Register a new business workspace and owner account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessSignUpDto"
      responses:
        "201":
          description: Business account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Rotate a refresh token and return a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenDto"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get the current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/sign-out:
    post:
      tags: [Auth]
      operationId: signOut
      summary: Revoke the current refresh token/session
      responses:
        "204":
          description: Signed out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /account/profile:
    get:
      tags: [Account]
      operationId: getAccountProfile
      summary: Get personal profile and address settings
      responses:
        "200":
          description: Account profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountProfile"
    patch:
      tags: [Account]
      operationId: updateAccountProfile
      summary: Update personal profile and address settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountProfileUpdateDto"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountProfile"
        "400":
          $ref: "#/components/responses/ValidationError"

  /account/security:
    get:
      tags: [Account]
      operationId: getSecuritySettings
      summary: Get security preferences and MFA state
      responses:
        "200":
          description: Security settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecuritySettings"
    patch:
      tags: [Account]
      operationId: updateSecuritySettings
      summary: Update security preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecuritySettingsUpdateDto"
      responses:
        "200":
          description: Updated security settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecuritySettings"

  /account/mfa:
    put:
      tags: [Account]
      operationId: configureMfa
      summary: Enable, update, or disable multi-factor authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaUpdateDto"
      responses:
        "200":
          description: Updated MFA settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaSettings"
        "400":
          $ref: "#/components/responses/ValidationError"

  /account/notification-preferences:
    get:
      tags: [Notifications]
      operationId: getNotificationPreferences
      summary: Get account toast/action notification preferences
      responses:
        "200":
          description: Notification preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"
    put:
      tags: [Notifications]
      operationId: updateNotificationPreferences
      summary: Replace account notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPreferencesUpdateDto"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"

  /onboarding/progress:
    get:
      tags: [Onboarding]
      operationId: getOnboardingProgress
      summary: Get current onboarding progress for the business workspace
      responses:
        "200":
          description: Onboarding progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingProgress"

  /onboarding/owner-information:
    put:
      tags: [Onboarding]
      operationId: saveOwnerInformation
      summary: Save owner information onboarding step
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OwnerInformationDto"
      responses:
        "200":
          description: Step saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStepResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /onboarding/business-information:
    put:
      tags: [Onboarding]
      operationId: saveBusinessInformation
      summary: Save business information onboarding step
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessInformationDto"
      responses:
        "200":
          description: Step saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStepResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /onboarding/bank-details:
    put:
      tags: [Onboarding]
      operationId: saveOnboardingBankDetails
      summary: Save bank details collected during onboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankAccountCreateDto"
      responses:
        "200":
          description: Step saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStepResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /onboarding/two-factor-auth:
    put:
      tags: [Onboarding]
      operationId: saveOnboardingMfa
      summary: Save MFA settings collected during onboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaUpdateDto"
      responses:
        "200":
          description: Step saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStepResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /onboarding/submit:
    post:
      tags: [Onboarding]
      operationId: submitOnboarding
      summary: Mark onboarding ready for review or activation
      responses:
        "200":
          description: Onboarding submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingProgress"
        "409":
          $ref: "#/components/responses/Conflict"

  /business/profile:
    get:
      tags: [Business]
      operationId: getBusinessProfile
      summary: Get current business details and shop location
      responses:
        "200":
          description: Business profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    patch:
      tags: [Business]
      operationId: updateBusinessProfile
      summary: Update business details or shop location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessUpdateDto"
      responses:
        "200":
          description: Updated business profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "400":
          $ref: "#/components/responses/ValidationError"

  /business/setup-warnings:
    get:
      tags: [Business]
      operationId: getSetupWarnings
      summary: Get account/business setup warnings for dashboard and settings
      x-cache:
        store: redis
        ttlSeconds: 60
        key: "business:{businessId}:setup-warnings"
      responses:
        "200":
          description: Setup warnings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SetupWarning"

  /dashboard/summary:
    get:
      tags: [Dashboard]
      operationId: getDashboardSummary
      summary: Get dashboard status counts and headline metrics
      x-cache:
        store: redis
        ttlSeconds: 120
        key: "business:{businessId}:dashboard:summary"
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/bookings/month:
    get:
      tags: [Dashboard]
      operationId: getDashboardMonthBookings
      summary: Get bookings that overlap a calendar month
      parameters:
        - in: query
          name: year
          required: true
          schema:
            type: integer
            minimum: 2000
            example: 2026
        - in: query
          name: month
          required: true
          description: Zero-based month number. 0 is January.
          schema:
            type: integer
            minimum: 0
            maximum: 11
            example: 3
      responses:
        "200":
          description: Calendar month bookings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarBookings"

  /dashboard/widgets:
    get:
      tags: [Dashboard]
      operationId: getDashboardWidgets
      summary: Get active and available dashboard widgets
      responses:
        "200":
          description: Dashboard widget preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardWidgetPreferences"
    put:
      tags: [Dashboard]
      operationId: updateDashboardWidgets
      summary: Replace active dashboard widget order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DashboardWidgetPreferencesUpdateDto"
      responses:
        "200":
          description: Updated dashboard widget preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardWidgetPreferences"

  /bookings:
    get:
      tags: [Bookings]
      operationId: listBookings
      summary: List bookings with filters, search, sort, and pagination
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/BookingStatus"
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
        - in: query
          name: search
          description: Matches booking id, service name, customer name, car make, or payment id.
          schema:
            type: string
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [serviceName, name, carMake, startDate, endDate, status, price]
        - $ref: "#/components/parameters/SortOrderQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Paginated bookings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBookings"
    post:
      tags: [Bookings]
      operationId: createBooking
      summary: Create a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingCreateDto"
      responses:
        "201":
          description: Created booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          $ref: "#/components/responses/ValidationError"

  /bookings/{bookingId}:
    get:
      tags: [Bookings]
      operationId: getBooking
      summary: Get booking details
      parameters:
        - $ref: "#/components/parameters/BookingIdPath"
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Bookings]
      operationId: updateBooking
      summary: Update booking fields
      parameters:
        - $ref: "#/components/parameters/BookingIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdateDto"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Bookings]
      operationId: deleteBooking
      summary: Delete a booking
      parameters:
        - $ref: "#/components/parameters/BookingIdPath"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /bookings/{bookingId}/status:
    patch:
      tags: [Bookings]
      operationId: updateBookingStatus
      summary: Accept, decline, complete, or move one booking
      parameters:
        - $ref: "#/components/parameters/BookingIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingStatusUpdateDto"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /bookings/batch/status:
    patch:
      tags: [Bookings]
      operationId: updateBookingStatuses
      summary: Bulk update booking statuses for selected rows
      x-queue:
        name: notification-dispatch
        reason: Send accepted/declined notifications without blocking the booking update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingBatchStatusUpdateDto"
      responses:
        "200":
          description: Batch status update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchMutationResult"
        "400":
          $ref: "#/components/responses/ValidationError"

  /customers:
    get:
      tags: [Customers]
      operationId: listCustomers
      summary: List customers for the current business
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Paginated customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCustomers"
    post:
      tags: [Customers]
      operationId: createCustomer
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreateDto"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          $ref: "#/components/responses/ValidationError"

  /customers/{customerId}:
    get:
      tags: [Customers]
      operationId: getCustomer
      summary: Get customer details
      parameters:
        - $ref: "#/components/parameters/CustomerIdPath"
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Customers]
      operationId: updateCustomer
      summary: Update customer details
      parameters:
        - $ref: "#/components/parameters/CustomerIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdateDto"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          $ref: "#/components/responses/NotFound"

  /vehicles:
    get:
      tags: [Vehicles]
      operationId: listVehicles
      summary: List vehicles for customers in the current business
      parameters:
        - in: query
          name: customerId
          schema:
            type: string
            format: uuid
        - in: query
          name: search
          schema:
            type: string
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Paginated vehicles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedVehicles"
    post:
      tags: [Vehicles]
      operationId: createVehicle
      summary: Create a vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleCreateDto"
      responses:
        "201":
          description: Created vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/{vehicleId}:
    get:
      tags: [Vehicles]
      operationId: getVehicle
      summary: Get vehicle details
      parameters:
        - $ref: "#/components/parameters/VehicleIdPath"
      responses:
        "200":
          description: Vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Vehicles]
      operationId: updateVehicle
      summary: Update vehicle details
      parameters:
        - $ref: "#/components/parameters/VehicleIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleUpdateDto"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /services/catalog:
    get:
      tags: [Services]
      operationId: getServiceCatalog
      summary: Get seeded service categories, services, icons, and config options
      security: []
      x-cache:
        store: redis
        ttlSeconds: 86400
        key: "catalog:services:v1"
      responses:
        "200":
          description: Service catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceCategory"

  /business/services:
    get:
      tags: [Services]
      operationId: listBusinessServices
      summary: List services offered by the current business
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/ServiceStatus"
      responses:
        "200":
          description: Business services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BusinessService"
    post:
      tags: [Services]
      operationId: createBusinessService
      summary: Add a service to the current business
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessServiceCreateDto"
      responses:
        "201":
          description: Created business service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessService"
        "400":
          $ref: "#/components/responses/ValidationError"

  /business/services/{businessServiceId}:
    patch:
      tags: [Services]
      operationId: updateBusinessService
      summary: Update a business service price, category, name, or status
      parameters:
        - $ref: "#/components/parameters/BusinessServiceIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessServiceUpdateDto"
      responses:
        "200":
          description: Updated business service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessService"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Services]
      operationId: deleteBusinessService
      summary: Remove a business service
      parameters:
        - $ref: "#/components/parameters/BusinessServiceIdPath"
      responses:
        "204":
          description: Removed
        "404":
          $ref: "#/components/responses/NotFound"

  /inventory/catalog:
    get:
      tags: [Inventory]
      operationId: getInventoryCatalog
      summary: Get inventory categories and option catalogs used by settings forms
      x-cache:
        store: redis
        ttlSeconds: 86400
        key: "catalog:inventory:v1"
      responses:
        "200":
          description: Inventory catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryCatalog"

  /inventory/items:
    get:
      tags: [Inventory]
      operationId: listInventoryItems
      summary: List inventory items/products with filters and pagination
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: brand
          description: Alias for company.
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: viscosity
          schema:
            type: string
        - in: query
          name: volume
          schema:
            type: string
        - in: query
          name: application
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Paginated inventory items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedInventoryItems"
    post:
      tags: [Inventory]
      operationId: createInventoryItem
      summary: Create an inventory item/product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemCreateDto"
      responses:
        "201":
          description: Created inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "400":
          $ref: "#/components/responses/ValidationError"

  /inventory/items/{inventoryItemId}:
    get:
      tags: [Inventory]
      operationId: getInventoryItem
      summary: Get inventory item details
      parameters:
        - $ref: "#/components/parameters/InventoryItemIdPath"
      responses:
        "200":
          description: Inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Inventory]
      operationId: updateInventoryItem
      summary: Update an inventory item/product
      parameters:
        - $ref: "#/components/parameters/InventoryItemIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
