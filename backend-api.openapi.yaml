        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Paginated messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedInboxMessages"

  /inbox/messages/{messageId}/read:
    post:
      tags: [Inbox]
      operationId: markInboxMessageRead
      summary: Mark an inbox message as read
      parameters:
        - $ref: "#/components/parameters/MessageIdPath"
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxMessage"
        "404":
          $ref: "#/components/responses/NotFound"

  /support/help-center:
    get:
      tags: [Support]
      operationId: getHelpCenter
      summary: Get help center categories and articles
      security: []
      x-cache:
        store: redis
        ttlSeconds: 3600
        key: "support:help-center:{locale}"
      parameters:
        - in: query
          name: locale
          schema:
            type: string
            enum: [en, ar]
            default: en
      responses:
        "200":
          description: Help center content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelpCenter"

  /support/tickets:
    post:
      tags: [Support]
      operationId: createSupportTicket
      summary: Create a support ticket/contact request
      x-queue:
        name: notification-dispatch
        reason: Notify support/admins without blocking the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportTicketCreateDto"
      responses:
        "201":
          description: Support ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"
        "400":
          $ref: "#/components/responses/ValidationError"

  /feedback:
    post:
      tags: [Support]
      operationId: createFeedback
      summary: Submit product feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackCreateDto"
      responses:
        "201":
          description: Feedback captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"

  /locations/search:
    get:
      tags: [Locations]
      operationId: searchLocations
      summary: Search geocoded locations for the location picker
      security: []
      parameters:
        - in: query
          name: query
          required: true
          schema:
            type: string
            minLength: 2
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 8
      x-cache:
        store: redis
        ttlSeconds: 86400
        key: "geo:search:{query}:{limit}"
      responses:
        "200":
          description: Location search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LocationSearchResult"

  /locations/nearby:
    get:
      tags: [Locations]
      operationId: getNearbyPointsOfInterest
      summary: Get nearby points of interest around a selected coordinate
      security: []
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
            format: double
        - in: query
          name: lng
          required: true
          schema:
            type: number
            format: double
        - in: query
          name: radiusMeters
          schema:
            type: integer
            minimum: 100
            maximum: 10000
            default: 1500
      x-cache:
        store: redis
        ttlSeconds: 3600
        key: "geo:nearby:{lat}:{lng}:{radiusMeters}"
      responses:
        "200":
          description: Nearby points of interest
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PointOfInterest"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageQuery:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitQuery:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    SortOrderQuery:
      in: query
      name: sortOrder
      schema:
        type: string
        enum: [asc, desc]
        default: asc
    BookingIdPath:
      in: path
      name: bookingId
      required: true
      schema:
        type: string
    CustomerIdPath:
      in: path
      name: customerId
      required: true
      schema:
        type: string
        format: uuid
    VehicleIdPath:
      in: path
      name: vehicleId
      required: true
      schema:
        type: string
        format: uuid
    BusinessServiceIdPath:
      in: path
      name: businessServiceId
      required: true
      schema:
        type: string
        format: uuid
    InventoryItemIdPath:
      in: path
      name: inventoryItemId
      required: true
      schema:
        type: string
        format: uuid
    PaymentIdPath:
      in: path
      name: paymentId
      required: true
      schema:
        type: string
    BillingAccountIdPath:
      in: path
      name: billingAccountId
      required: true
      schema:
        type: string
        format: uuid
    JobIdPath:
      in: path
      name: jobId
      required: true
      schema:
        type: string
        format: uuid
    MessageIdPath:
      in: path
      name: messageId
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication is missing, invalid, or expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: The authenticated user cannot access this resource
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Conflict:
      description: Request conflicts with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

  schemas:
    ApiError:
      type: object
      required: [statusCode, code, message]
      properties:
        statusCode:
          type: integer
          example: 400
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Please enter a valid email address.
        details:
          type: array
          items:
            $ref: "#/components/schemas/ApiErrorDetail"
        requestId:
          type: string
          nullable: true

    ApiErrorDetail:
      type: object
      properties:
        field:
          type: string
          example: email
        message:
          type: string
          example: Please enter a valid email address.

    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [ok]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        redis:
          type: string
          enum: [ok, degraded, down]
        database:
          type: string
          enum: [ok, degraded, down]
        queues:
          type: string
          enum: [ok, degraded, down]

    Pagination:
      type: object
      required: [total, page, limit, pages]
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        pages:
          type: integer

    BatchMutationResult:
      type: object
      required: [requested, succeeded, failed]
      properties:
        requested:
          type: integer
        succeeded:
          type: integer
        failed:
          type: integer
        failedIds:
          type: array
          items:
            type: string

    Role:
      type: string
      enum: [client, business, admin]

    SignInDto:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
        role:
          type: string
          enum: [client, business, admin]
        rememberMe:
          type: boolean
          default: false

    RefreshTokenDto:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          default: Bearer
        expiresIn:
          type: integer
          description: Access token lifetime in seconds.
          example: 900
        user:
          $ref: "#/components/schemas/User"

    BusinessSignUpDto:
      type: object
      required:
        - email
        - password
        - name
        - phoneNumber
        - country
        - city
        - commercialRegistrationNumber
        - taxIdentificationNumber
        - businessOwner
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[^A-Za-z0-9]).{12,}$"
        name:
          type: string
          minLength: 1
        phoneNumber:
          type: string
        country:
          type: string
        city:
          type: string
        commercialRegistrationNumber:
          type: string
          description: Correct spelling for the backend/database field.
        commercialRegistraionNumber:
          type: string
          deprecated: true
          description: Legacy frontend typo. Accept only as a transitional alias.
        taxIdentificationNumber:
          type: string
        businessOwner:
          $ref: "#/components/schemas/BusinessOwnerCreateDto"

    BusinessOwnerCreateDto:
      type: object
      required: [email, firstName, lastName, phoneNumber, streetAddress, country, city]
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phoneNumber:
          type: string
        streetAddress:
          type: string
        country:
          type: string
        city:
          type: string

    User:
      type: object
      required: [id, email, role, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
          nullable: true
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/Role"
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        onboardingCompleted:
          type: boolean
        twoFactorEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Address:
      type: object
      required: [country, streetAddress, city, state, zipCode]
      properties:
        country:
          type: string
          example: Saudi Arabia
        streetAddress:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        lat:
          type: number
          format: double
          nullable: true
        lng:
          type: number
          format: double
          nullable: true

    AccountProfile:
      type: object
      required: [id, firstName, lastName, address]
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        birthDate:
          type: string
          format: date
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        address:
          $ref: "#/components/schemas/Address"
        setupStatus:
          $ref: "#/components/schemas/SetupStatus"

    AccountProfileUpdateDto:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        birthDate:
          type: string
          format: date
          nullable: true
        phoneNumber:
          type: string
        address:
          $ref: "#/components/schemas/Address"

    SecurityPreferenceKey:
      type: string
      enum:
        - loginAlerts
        - newDeviceApproval
        - sessionTimeout
        - paymentExportConfirmation

    SecurityPreference:
      type: object
      required: [key, title, description, enabled]
      properties:
        key:
          $ref: "#/components/schemas/SecurityPreferenceKey"
        title:
          type: string
        description:
          type: string
        enabled:
          type: boolean

    SecuritySettings:
      type: object
      required: [preferences, mfa]
      properties:
        preferences:
          type: array
          items:
            $ref: "#/components/schemas/SecurityPreference"
        mfa:
          $ref: "#/components/schemas/MfaSettings"

    SecuritySettingsUpdateDto:
      type: object
      required: [preferences]
      properties:
        preferences:
          type: object
          additionalProperties:
            type: boolean
          example:
            loginAlerts: true
            newDeviceApproval: true
            sessionTimeout: true
            paymentExportConfirmation: false

    MfaMethod:
      type: string
      enum: [sms, authenticator]

    MfaSettings:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        method:
          $ref: "#/components/schemas/MfaMethod"
        phone:
          type: string
          nullable: true
        verifiedAt:
          type: string
          format: date-time
          nullable: true

